version: "3.8"
services:
  jade:
    image: lrunningmjgoat/jadeinventory:latest
    container_name: jade-inventory
    ports:
      - "8080:8000"
    volumes:
      # 数据持久化：数据库 + 上传图片
      # ⚠️ 极空间 NAS 必须使用绝对路径！相对路径 ./data 会解析到系统内部目录，
      #    你在文件管理器中看不到，重启也会丢失。
      #    请根据你的 NAS 实际目录修改下面两行路径。
      #    常见极空间路径格式：/vol1/1000/docker/jade-inventory/data
      #    你可以在极空间文件管理器中右键文件夹 → "详情" 查看真实路径。
      - /vol1/1000/docker/jade-inventory/data:/app/data
      # 配置持久化：.env 由容器首次启动自动生成（但 JWT_SECRET 已在下方 environment 中预置）
      - /vol1/1000/docker/jade-inventory/config:/app/config
    environment:
      # ── 固定的环境变量（不需要修改）──
      - DB_PATH=/app/data/jade.db
      - IMAGE_DIR=/app/data/images
      - CORS_ORIGINS=*
      - TZ=Asia/Shanghai
      # ── JWT 签名密钥（已预生成随机值，无需手动配置）──
      #    此密钥在 environment 中显式配置，优先级高于 config/.env。
      #    如果需要更换，修改下方值后重启容器即可。
      - JWT_SECRET=df5a125f076b7ea52a12fc6cf0eceb7efcf5764fa9bc65e00f4ca2adefccb11c
    restart: unless-stopped
