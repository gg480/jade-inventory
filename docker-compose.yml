version: "3.8"

# ══════════════════════════════════════════════
#  玉器进销存系统 — 极空间 Docker Compose 配置
# ══════════════════════════════════════════════
#
# 使用说明：
#
# 1. 必须修改 JWT_SECRET
#    把下面的 JWT_SECRET 值改成任意随机字符串（至少16位）
#    例如：JWT_SECRET=Jade2025Secret@NAS
#
# 2. 把这个文件内容粘贴到极空间"容器管理 → Compose"里新建项目
#    项目名建议填：jade-inventory
#
# 3. 数据存放位置（自动创建，不需要手动建目录）：
#    文件管理器 → Container → jade-inventory → data → jade.db（数据库）
#                                             → data → images（图片）
#                                             → config → .env（配置）
#
# ══════════════════════════════════════════════

services:
  jade:
    image: lrunningmjgoat/jadeinventory:latest
    container_name: jade-inventory
    ports:
      - "8080:8000"
    volumes:
      # 相对路径：自动保存在 Compose 项目目录下
      # 极空间文件管理器路径：Container/jade-inventory/data/
      - ./data:/app/data
      - ./config:/app/config
    environment:
      # ── 必须修改！JWT 签名密钥 ──────────────
      # 改成你自己的随机字符串（至少16位），用于登录安全
      - JWT_SECRET=please-change-this-to-your-own-secret

      # ── 以下保持默认即可 ──────────────────
      - DB_PATH=/app/data/jade.db
      - IMAGE_DIR=/app/data/images
      - CORS_ORIGINS=*
      - TZ=Asia/Shanghai
      # 可选：Token有效天数（默认30天）
      # - JWT_EXPIRE_DAYS=30
      # 可选：首次部署的初始管理员密码（默认 admin123）
      # - DEFAULT_ADMIN_PASSWORD=admin123

    restart: unless-stopped
