version: "3.8"
services:
  jade:
    image: lrunningmjgoat/jadeinventory:latest
    container_name: jade-inventory
    ports:
      - "8080:8000"
    volumes:
      # 数据持久化：数据库 + 图片
      - ./data:/app/data
      # 配置持久化
      - ./config:/app/config
    # 从 config/.env 读取配置（优先级高于下面的 environment）
    env_file:
      - ./config/.env
    environment:
      # 默认值，会被 config/.env 覆盖
      - DB_PATH=/app/data/jade.db
      - IMAGE_DIR=/app/data/images
      - CORS_ORIGINS=*
      - JWT_SECRET=change-this-to-a-random-string
      - TZ=Asia/Shanghai
    restart: unless-stopped
