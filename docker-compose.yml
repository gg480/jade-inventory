version: "3.8"
services:
  jade:
    image: lrunningmjgoat/jadeinventory:latest
    container_name: jade-inventory
    ports:
      - "8080:8000"
    volumes:
      # 数据持久化：数据库 + 上传图片
      - ./data:/app/data
      # 配置持久化：.env 由容器首次启动自动生成
      - ./config:/app/config
    environment:
      # 固定的环境变量（不需要用户修改）
      - DB_PATH=/app/data/jade.db
      - IMAGE_DIR=/app/data/images
      - CORS_ORIGINS=*
      - TZ=Asia/Shanghai
    restart: unless-stopped
