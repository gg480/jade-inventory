version: "3.8"
services:
  jade:
    image: lrunningmjgoat/jadeinventory:latest
    container_name: jade-inventory
    ports:
      - "8080:8000"
    volumes:
      # 数据持久化：数据库 + 图片
      - ./data:/app/data
      # 配置目录（备用，以后可通过文件读取配置）
      - ./config:/app/config
    environment:
      # ↓↓↓ 必改：改成你自己的随机字符串 ↓↓↓
      - JWT_SECRET=change-this-to-a-random-string
      # 以下一般不用改
      - DB_PATH=/app/data/jade.db
      - IMAGE_DIR=/app/data/images
      - CORS_ORIGINS=*
      - TZ=Asia/Shanghai
    restart: unless-stopped
