version: "3.8"
services:
  jade:
    image: lrunningmjgoat/jadeinventory:latest
    container_name: jade-inventory
    ports:
      - "8080:8000"
    volumes:
      # 数据持久化：数据库 + 上传图片都保存在本地 ./data 目录
      # 极空间上映射路径示例：/vol1/1000/docker/jade-inventory/data:/app/data
      - ./data:/app/data
    environment:
      # ↓↓↓ 首次部署请修改 JWT_SECRET 为任意随机字符串 ↓↓↓
      - JWT_SECRET=change-this-to-a-random-string
      # ↓↓↓ 其他配置一般不用改 ↓↓↓
      - DB_PATH=/app/data/jade.db
      - IMAGE_DIR=/app/data/images
      - CORS_ORIGINS=*
      - TZ=Asia/Shanghai
    restart: unless-stopped
