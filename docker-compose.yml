version: "3.8"
services:
  jade:
    image: gg480/jade-inventory:latest
    container_name: jade-inventory
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/jade.db
      - IMAGE_DIR=/app/data/images
      - CORS_ORIGINS=*
      - JWT_SECRET=change-this-to-a-random-string
      - TZ=Asia/Shanghai
    restart: unless-stopped
